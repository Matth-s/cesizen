services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres_backend
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydb']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    container_name: fastify_api
    restart: always
    ports:
      - '3000:3000'
      - '5555:5555'
    environment:
      DATABASE_URL: 'postgresql://myuser:mypassword@postgres-db:5432/mydb?schema=public'
    depends_on:
      postgres-db:
        condition: service_healthy
