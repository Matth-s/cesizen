services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - backoffice
      # - mobile-app

  api:
    image: ${MONO_PROJECT_BACK}:latest
    container_name: fastify_api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${AZURE_VM_IP}
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000',
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    env_file:
      - .env

  backoffice:
    image: ${MONO_PROJECT_FRONT}:latest
    container_name: vite_backoffice
    restart: always
    expose:
      - '5173'
    environment:
      - VITE_PUBLIC_API_ROUTE=http://${AZURE_VM_IP}/api
    depends_on:
      - api

