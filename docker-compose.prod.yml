version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - backoffice
      - mobile-app

  api:
    image: ${MONO_PROJECT_BACK}
    container_name: fastify_api
    restart: always
    expose:
      - '3000'
    env_file:
      - .env

  backoffice:
    image: ${MONO_PROJECT_FRONT}
    container_name: vite_backoffice
    restart: always
    expose:
      - '5173'
    environment:
      - VITE_PUBLIC_API_ROUTE=http://${AZURE_VM_IP}/api
    depends_on:
      - api

  mobile-app:
    image: ghcr.io/${IMAGE_NAME_LOWER}-mobile:latest
    container_name: vite_mobile
    restart: always
    expose:
      - '5174'
    environment:
      - VITE_PUBLIC_API_ROUTE=http://${AZURE_VM_IP}/api
    depends_on:
      - api
