name: 02-3 - Deploy
on: workflow_call

jobs:
  AzureServer:
    environment: buze
    runs-on: ubuntu-22.04

    env:
      ResourceGroupName: 'cesizen'
      ResourceGroupLocation: 'spaincentral'

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI Resource Group
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az group create --name ${{ env.ResourceGroupName }} --location ${{ env.ResourceGroupLocation }}

      - name: Checkout Bicep
        uses: actions/checkout@v4

      - name: Azure Bicep Deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.ResourceGroupName }}
          scope: resourcegroup
          template: ./main.bicep
          parameters: >
            adminUsername=${{secrets.AZURE_VM_LOGIN}}
            adminPasswordOrKey=${{secrets.AZURE_VM_PASSWORD}}
            vmName=vm-stagging
            vmSize=Standard_B2s

      - name: Open Port on Security Group
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az network nsg rule create --resource-group ${{env.ResourceGroupName}} --nsg-name SecGroupNet --name PortApi-3000 --priority 100 --direction Inbound --access Allow --protocol Tcp --destination-port-ranges 3000

            az network nsg rule create --resource-group ${{env.ResourceGroupName}} --nsg-name SecGroupNet --name PortBackoffice-5173 --priority 101 --direction Inbound --access Allow --protocol Tcp --destination-port-ranges 5173

            az network nsg rule create --resource-group ${{env.ResourceGroupName}} --nsg-name SecGroupNet --name PortMobile-5174 --priority 102 --direction Inbound --access Allow --protocol Tcp --destination-port-ranges 5174

      - name: Get Public IP et créer règle
        if: success()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            #!/bin/bash
            az vm show -d -g ${{env.ResourceGroupName}} -n vm-stagging --query publicIps -o tsv
            echo "AZURE_VM_IP=$(az vm show -d -g ${{env.ResourceGroupName}} -n vm-stagging --query publicIps -o tsv)" >> $GITHUB_ENV

      - name: Install Docker on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{env.AZURE_VM_IP}}
          port: ${{secrets.PORT}}
          username: ${{secrets.AZURE_VM_LOGIN}}
          password: ${{secrets.AZURE_VM_PASSWORD}}
          script: |
            curl -o install_docker.sh https://raw.githubusercontent.com/Base-Auto/scripts/refs/heads/main/install_docker_quick.sh
            ls -al
            sudo bash ./install_docker.sh

      - name: Set DNS Domain in Jenpeuplus.com
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az network dns record-set a add-record -g git-cda25 -z cda25.jenpeuplus.com -n demo -a ${{env.AZURE_VM_IP}}

      - name: Update Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{env.AZURE_VM_IP}}
          port: ${{secrets.PORT}}
          username: ${{secrets.AZURE_VM_LOGIN}}
          password: ${{secrets.AZURE_VM_PASSWORD}}

          source: './docker-compose.yml'
          target: '.'

      - name: Downcase Image Name
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Start compose file
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{env.AZURE_VM_IP}}
          port: ${{secrets.PORT}}
          username: ${{secrets.AZURE_VM_LOGIN}}
          password: ${{secrets.AZURE_VM_PASSWORD}}
          script: |
            echo ${{secrets.PAT_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin

            echo MONO_PROJECT_BACK=ghcr.io/${{env.IMAGE_NAME_LOWER}}-back > .env
            echo MONO_PROJECT_FRONT=ghcr.io/${{env.IMAGE_NAME_LOWER}}-front >> .env

            echo MARIADB_ROOT_PASSWORD = toor >> .env
            echo MARIADB_DATABASE = ratp_foreach >> .env
            echo MARIADB_USER = ratp_foreach >> .env
            echo MARIADB_PASSWORD = ratp_foreach >> .env

            docker pull ghcr.io/${{env.IMAGE_NAME_LOWER}}-back
            docker pull ghcr.io/${{env.IMAGE_NAME_LOWER}}-front

            docker compose up -d
