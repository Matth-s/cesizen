name: 01-3 - Integration - SNYK

on: workflow_call

jobs:
  SecurityBack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: install dep
        run: npm i

      - name: Run Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=medium --file=./backend/package.json --org=${{secrets.SNYK_ORG_ID}}

      - name: Run Snyk Monitor
        if: always()
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --severity-threshold=medium --file=./backend/package.json --org=${{secrets.SNYK_ORG_ID}}

  SecurityFront:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backoffice

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: install dep
        run: npm i

      - name: Run Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=medium --file=./backoffice/package.json --org=${{secrets.SNYK_ORG_ID}}

      - name: Run Snyk Monitor
        if: always()
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --severity-threshold=medium --file=./backoffice/package.json --org=${{secrets.SNYK_ORG_ID}}
