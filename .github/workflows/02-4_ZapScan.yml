name: 02-4 - Deploy - ZAP Scan

on: workflow_call
#    changer
jobs:
  Back_Zap_Scan:
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          format: openapi
          target: 'http://demo.cda25.jenpeuplus.com:12000'
          fail_action: true
          artifact_name: 'back_zap_scan'
          issue_title: 'ZAP Back Scan Report'

  Front_Zap_Scan:
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://demo.cda25.jenpeuplus.com:80'
          fail_action: true
          artifact_name: 'front_zap_scan'
          issue_title: 'ZAP Front Scan Report'
