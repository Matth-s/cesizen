name: 02-4 - Deploy - ZAP Scan

on: workflow_call

jobs:
  Back_Zap_Scan:
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          format: openapi
          target: 'http://68.221.72.147/api/documentation/json'
          fail_action: true # Change à false si tu ne veux pas que ton pipeline bloque en cas de faille trouvée
          artifact_name: 'back_zap_scan'
          issue_title: 'ZAP Back Scan Report'
          # Utilisation de la syntaxe ZAP globale pour changer le port
          cmd_options: '-config proxy.port=8090'

  Front_Zap_Scan:
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://68.221.72.147:80'
          fail_action: true # Change à false si tu veux juste le rapport sans bloquer la CI
          artifact_name: 'front_zap_scan'
          issue_title: 'ZAP Front Scan Report'
          # Correction ici : on utilise -config proxy.port au lieu de -p
          cmd_options: '-config proxy.port=8091'
