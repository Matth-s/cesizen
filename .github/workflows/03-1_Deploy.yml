name: 03-1 - Deploy - OVH

on:
  workflow_call:

env:
  DEPLOY_PATH: /opt/cesizen
  IMAGE_OWNER: matth-s

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate .env
        run: |
          echo "MONO_PROJECT_BACK=ghcr.io/${{ env.IMAGE_OWNER }}/cesizen-back" > .env
          echo "MONO_PROJECT_FRONT=ghcr.io/${{ env.IMAGE_OWNER }}/cesizen-front" >> .env

          echo "FRONTEND_URL=${{ secrets.VPS_HOST }}" >> .env
          echo "NODE_ENV=production" >> .env
          echo "AZURE_VM_IP=${{ secrets.VPS_HOST }}" >> .env
          echo "DIRECT_URL=${{ secrets.SUPABASE_DIRECT_URL }}" >> .env
          echo "DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" >> .env

          echo "JWT_ACCESS_PRIVATE=$(printf '%s' '${{ secrets.JWT_ACCESS_PRIVATE }}' | sed ':a;N;$!ba;s/\n/\\n/g')" >> .env
          echo "JWT_ACCESS_PUBLIC=$(printf '%s' '${{ secrets.JWT_ACCESS_PUBLIC }}' | sed ':a;N;$!ba;s/\n/\\n/g')" >> .env
          echo "JWT_REFRESH_PRIVATE=$(printf '%s' '${{ secrets.JWT_REFRESH_PRIVATE }}' | sed ':a;N;$!ba;s/\n/\\n/g')" >> .env
          echo "JWT_REFRESH_PUBLIC=$(printf '%s' '${{ secrets.JWT_REFRESH_PUBLIC }}' | sed ':a;N;$!ba;s/\n/\\n/g')" >> .env

      - name: Prepare VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              echo "=== Installation de Docker ==="
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            echo "=== Installation de PostgreSQL Client ==="
            sudo apt-get update
            sudo apt-get install -y postgresql-client

            echo "=== Vérification ==="
            docker --version
            docker compose version
            pg_dump --version

            echo "=== Création des dossiers ==="
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo mkdir -p /opt/scripts
            sudo mkdir -p /opt/backups/supabase

            sudo chown -R $USER:$USER ${{ env.DEPLOY_PATH }}
            sudo chown -R $USER:$USER /opt/scripts
            sudo chown -R $USER:$USER /opt/backups

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'docker-compose.prod.yml'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Copy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'nginx.conf'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Copy backup script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'scripts/backup-supabase.sh'
          target: '/opt/scripts/'

      - name: Copy .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: '.env'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "${{ secrets.PAT_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd ${{ env.DEPLOY_PATH }}

            echo "=== Pull des images ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Démarrage ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Nettoyage Docker ==="
            docker image prune -af

      - name: Configure automatic backups
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            chmod +x /opt/scripts/backup-supabase.sh

            (
              crontab -l 2>/dev/null | grep -v "/opt/scripts/backup-supabase.sh"
              echo "0 3 * * * /opt/scripts/backup-supabase.sh"
            ) | crontab -

            echo "=== Cron installé ==="
            crontab -l
