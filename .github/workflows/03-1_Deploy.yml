name: 03-1 - Deploy - OVH

on:
  workflow_call:

env:
  DEPLOY_PATH: /opt/cesizen
  IMAGE_OWNER: matth-s

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate .env
        run: |
          echo "MONO_PROJECT_BACK=ghcr.io/${{ env.IMAGE_OWNER }}/cesizen-back" > .env
          echo "MONO_PROJECT_FRONT=ghcr.io/${{ env.IMAGE_OWNER }}/cesizen-front" >> .env

          echo "FRONTEND_URL=${{ secrets.VPS_HOST }}" >> .env
          echo "NODE_ENV=production" >> .env
          echo "AZURE_VM_IP=${{ secrets.VPS_HOST }}" >> .env
          echo "DIRECT_URL=${{ secrets.SUPABASE_DIRECT_URL }}" >> .env
          echo "DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" >> .env
          echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" >> .env
          echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env

      - name: Prepare VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # Installer Docker s'il n'est pas présent
            if ! command -v docker >/dev/null 2>&1; then
              echo "=== Installation de Docker ==="

              curl -fsSL https://get.docker.com | sudo sh

              sudo usermod -aG docker $USER

              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            echo "=== Vérification Docker ==="
            docker --version
            docker compose version

            echo "=== Création du dossier de déploiement ==="
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo chown -R $USER:$USER ${{ env.DEPLOY_PATH }}

            ls -la ${{ env.DEPLOY_PATH }}

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'docker-compose.prod.yml'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Copy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'nginx.conf'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Copy .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: '.env'
          target: '${{ env.DEPLOY_PATH }}/'

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo ${{secrets.PAT_TOKEN}} | docker login ghcr.io -u ${{github.actor}} --password-stdin

            set -e
            cd ${{ env.DEPLOY_PATH }}

            echo "=== Répertoire ==="
            pwd
            ls -la

            echo "=== Téléchargement des images ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Redémarrage des conteneurs ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Nettoyage ==="
            docker image prune -af

            echo "Déploiement terminé."
