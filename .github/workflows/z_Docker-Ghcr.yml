name: Z - Delivery - Docker GHCR

on:
  workflow_call:
    inputs:
      docker-mode:
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  USERNAME: ${{github.actor}}
  IMAGE_NAME: ${{github.repository}}

jobs:
  Build-Push-Docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: ${{env.REGISTRY}}
          username: ${{env.USERNAME}}
          password: ${{secrets.PAT_TOKEN}}

      - name: Downcase Image Name
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Back Build Push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{env.REGISTRY}}/${{env.IMAGE_NAME_LOWER}}-back
          build-args: |
            DATABASE_URL=postgresql://postgres:password@127.0.0.1:5432/mydb?schema=public

      - name: Front Build Push
        uses: docker/build-push-action@v5
        with:
          context: backoffice
          push: true
          tags: ${{env.REGISTRY}}/${{env.IMAGE_NAME_LOWER}}-front

      - name: Mobile Build Push
        uses: docker/build-push-action@v5
        with:
          context: user-front
          push: true
          tags: ${{env.REGISTRY}}/${{env.IMAGE_NAME_LOWER}}-mobile
