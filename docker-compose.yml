      FRONTEND_URL: http://backoffice:5173
    command: sh -c "npx prisma generate && npx prisma db push && node dist/server.js"
    depends_on:
      postgres-db:
        condition: service_healthy

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: vite_backoffice
    environment:
      - VITE_PUBLIC_API_ROUTE=http://api:3000/api
    restart: always
    ports:
      - '5173:5173'
    depends_on:
      - api

  mobile-app:
    build:
      context: ./user-front
      dockerfile: Dockerfile
    ports:
      - '5174:5174'
    depends_on:
      - api

volumes:
  postgres_data:
