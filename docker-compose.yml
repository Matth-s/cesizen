services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres_backend
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydb']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastify_api
    restart: always
    ports:
      - '3000:3000'
      - '5555:5555'
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@postgres-db:5432/mydb?schema=public'
      - DIRECT_URL=postgresql://myuser:mypassword@postgres-db:5432/mydb?schema=public'
      - JWT_ACCESS_SECRET=fe14062e57f87e79e619b53ed836ffdbb8a8ef2757224a5f6302d7920dea7be679c91e522fc4026b90a45e36be20aed8f92eb0029f0d94e27afb24f4efedd8da
      - JWT_REFRESH_SECRET=2ce8e15e06badb280b70d7038d7f9d62f0c88fcf38f8cc0638a2a9c3bd79e06ed3fbc7070ecbd649006875b81c2f59df87bebcfb54f0b15637cd7d8030a83d20
      - FRONTEND_URL=http://backoffice:5173
    depends_on:
      postgres-db:
        condition: service_healthy

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: vite_backoffice
    environment:
      - VITE_PUBLIC_API_ROUTE=http://api:3000/api
    restart: always
    ports:
      - '5173:5173'
    depends_on:
      - api

  mobile-app:
    build:
      context: ./user-front
      dockerfile: Dockerfile
    ports:
      - '5174:5174'
    depends_on:
      - api

volumes:
  postgres_data:
